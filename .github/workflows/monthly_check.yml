# Step 7 (cron wrapper): monthly automated check for a new CGD report.
# Thin wrapper only -- all logic lives in src/*.py (see HANDOFF.md Step 7).
#
# Key decisions (full rationale in HANDOFF.md):
# - Pushes straight to main, no PR: this workflow only ever commits data
#   (manifest + raw xlsx), and validate_structure.py already blocks bad
#   files before the commit step can run.
# - warehouse.duckdb is NOT rebuilt/committed here -- stays a local
#   artifact, run `python src/load.py` after pulling to refresh it.
# - "Flag CGD check failures" (below) turns a failed fetch into a visible
#   red X instead of looking like a normal "nothing new" month -- see
#   HANDOFF.md's "CGD returned HTTP 403" note.

name: Monthly CGD data check

on:
  schedule:
    - cron: '0 3 1 * *'  # 03:00 UTC on the 1st of every month
  workflow_dispatch: {}   # manual "Run workflow" button -- for demos, no need to wait for the schedule

permissions:
  contents: write  # needed to push the manifest/raw-file update back to the repo

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run detector (informational -- download.py does its own authoritative check independently)
        run: python src/detect.py

      - name: Run downloader
        id: download
        run: |
          OUTPUT=$(python src/download.py)
          echo "$OUTPUT"
          {
            echo "result<<DOWNLOAD_EOF"
            echo "$OUTPUT"
            echo "DOWNLOAD_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Flag CGD check failures distinctly from "nothing new" months
        run: |
          RESULT="${{ steps.download.outputs.result }}"
          CGD_LINE=$(echo "$RESULT" | grep '^CGD:' | head -1)
          echo "CGD line: $CGD_LINE"
          if echo "$CGD_LINE" | grep -qE 'could not fetch|no report rows found'; then
            echo "::error::CGD check did NOT complete this run (this is a FAILED check, not a normal 'nothing new' month): $CGD_LINE -- if this repeats across several runs, CGD may be blocking this runner's IP range (see HANDOFF.md's 'Open risk: CGD returned HTTP 403...' note)."
            exit 1
          fi

      - name: Run extract -> clean -> load (only if a new CGD file was actually downloaded)
        if: contains(steps.download.outputs.result, 'downloaded new file')
        run: |
          python src/extract.py
          python src/clean.py
          python src/load.py

      - name: Commit and push the new raw file + manifest (only if a new CGD file was actually downloaded)
        if: contains(steps.download.outputs.result, 'downloaded new file')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/manifest.json raw/cgd/*.xlsx
          git commit -m "Auto-update: new CGD report ($(date -u +%Y-%m-%d))"
          git push origin HEAD:main
