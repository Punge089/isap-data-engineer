<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ERD Diagram — Row-Level PK/FK Connections</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000000;
    color: #ffffff;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #wrap { padding: 32px; overflow: auto; }
  #legend {
    display: flex; gap: 24px; align-items: center;
    margin-bottom: 16px; font-size: 14px; flex-wrap: wrap;
  }
  #legend .item { display: flex; align-items: center; gap: 8px; }
  #legend .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
  #legend .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  h1 { font-size: 20px; margin: 0 0 6px 0; }
  p.sub { color: #9ca3af; font-size: 13px; margin: 0 0 18px 0; }

  #erd svg { display: block; background: #000000; }

  .tbl-box { fill: #0b0f1a; stroke: #374151; stroke-width: 1.5px; }
  .hdr-dim { fill: #3730a3; }
  .hdr-fact { fill: #991b1b; }
  .hdr-text { fill: #ffffff; font-size: 14px; font-weight: 800; }

  .row-rect { fill: #111827; stroke: #1f2937; stroke-width: 1px; }
  .row-rect:hover { fill: #1e293b; }
  .row-rect.pk { fill: #1c1a0f; }
  .row-rect.fk { fill: #0f1b1e; }
  .row-rect.uk { fill: #170f1e; }

  .bar-pk { fill: #facc15; }
  .bar-fk { fill: #22d3ee; }
  .bar-uk { fill: #c084fc; }
  .bar-none { fill: #374151; }

  .field-name { fill: #f3f4f6; font-size: 12.5px; font-weight: 600; }
  .field-name.pk { fill: #fde68a; }
  .field-name.fk { fill: #a5f3fc; }
  .field-type { fill: #6b7280; font-size: 11px; }
  .field-badge { fill: #9ca3af; font-size: 10px; font-weight: 700; }

  .rel-line { fill: none; stroke: #64748b; stroke-width: 2px; opacity: 0.85; }
  .rel-line.hi { stroke: #94a3b8; stroke-width: 2.4px; }

  .endpoint-pk { fill: #facc15; stroke: #000; stroke-width: 1px; }
  .endpoint-fk { fill: #22d3ee; stroke: #000; stroke-width: 1px; }
  .endpoint-label { fill: #e5e7eb; font-size: 10px; font-weight: 800; }
</style>
</head>
<body>
<div id="wrap">
  <h1>ERD — Data Warehouse (fact_disbursement × fact_workforce_summary)</h1>
  <p class="sub">Every line starts exactly at a PK row and ends exactly at the matching FK row — not at the table box.</p>

  <div id="legend">
    <div class="item"><span class="swatch" style="background:#3730a3"></span> Dimension table</div>
    <div class="item"><span class="swatch" style="background:#991b1b"></span> Fact table</div>
    <div class="item"><span class="dot" style="background:#facc15"></span> PK (the "1" side)</div>
    <div class="item"><span class="dot" style="background:#22d3ee"></span> FK (the "N" side)</div>
    <div class="item"><span class="swatch" style="background:#c084fc"></span> UK (unique key)</div>
  </div>

  <div id="erd"></div>
</div>

<script>
(function () {
  const HEADER_H = 34;
  const ROW_H = 26;

  // ---------- table definitions (x, y = top-left corner) ----------
  const tables = {
    dim_date: {
      x: 40, y: 60, width: 260, kind: 'dim',
      rows: [
        { name: 'date_key', type: 'int', key: 'PK' },
        { name: 'date_natural_key', type: 'varchar', key: 'UK' },
        { name: 'report_date', type: 'date', key: '' },
        { name: 'fiscal_year_be', type: 'int', key: '' },
        { name: 'fiscal_year_ce', type: 'int', key: '' },
        { name: 'month', type: 'int', key: '' },
        { name: 'quarter', type: 'int', key: '' },
        { name: 'is_month_end', type: 'boolean', key: '' },
      ]
    },
    dim_ministry: {
      x: 40, y: 360, width: 260, kind: 'dim',
      rows: [
        { name: 'ministry_key', type: 'int', key: 'PK' },
        { name: 'ministry_code', type: 'varchar', key: 'UK' },
        { name: 'ministry_name_th', type: 'varchar', key: '' },
        { name: 'source_name_raw', type: 'varchar', key: '' },
      ]
    },
    dim_expense_type: {
      x: 40, y: 560, width: 260, kind: 'dim',
      rows: [
        { name: 'expense_type_key', type: 'int', key: 'PK' },
        { name: 'expense_type_name', type: 'varchar', key: 'UK' },
        { name: 'is_leaf', type: 'boolean', key: '' },
      ]
    },
    dim_source: {
      x: 1320, y: 60, width: 260, kind: 'dim',
      rows: [
        { name: 'source_id', type: 'int', key: 'PK' },
        { name: 'agency', type: 'varchar', key: '' },
        { name: 'source_url', type: 'varchar', key: '' },
        { name: 'file_name', type: 'varchar', key: '' },
        { name: 'file_hash', type: 'varchar', key: 'UK' },
        { name: 'ingested_at', type: 'timestamp', key: '' },
      ]
    },
    dim_personnel_category: {
      x: 1320, y: 320, width: 260, kind: 'dim',
      rows: [
        { name: 'personnel_category_key', type: 'int', key: 'PK' },
        { name: 'category_name', type: 'varchar', key: 'UK' },
      ]
    },
    fact_disbursement: {
      x: 660, y: 60, width: 320, kind: 'fact',
      rows: [
        { name: 'date_key', type: 'int', key: 'FK' },
        { name: 'ministry_key', type: 'int', key: 'FK' },
        { name: 'expense_type_key', type: 'int', key: 'FK' },
        { name: 'source_id', type: 'int', key: 'FK' },
        { name: 'budget_after_transfer', type: 'double', key: '' },
        { name: 'allocated', type: 'double', key: '' },
        { name: 'spending_plan', type: 'double', key: '' },
        { name: 'po_reserved', type: 'double', key: '' },
        { name: 'disbursed', type: 'double', key: '' },
        { name: 'remaining', type: 'double', key: '' },
        { name: 'disbursed_pct', type: 'double', key: '' },
      ]
    },
    fact_workforce_summary: {
      x: 660, y: 480, width: 320, kind: 'fact',
      rows: [
        { name: 'date_key', type: 'int', key: 'FK' },
        { name: 'personnel_category_key', type: 'int', key: 'FK' },
        { name: 'source_id', type: 'int', key: 'FK' },
        { name: 'headcount', type: 'bigint', key: '' },
        { name: 'share_pct', type: 'double', key: '' },
        { name: 'hierarchy_level', type: 'tinyint', key: '' },
        { name: 'parent_category_key', type: 'int', key: 'FK' },
        { name: 'is_leaf', type: 'boolean', key: '' },
      ]
    },
  };

  // ---------- relations: exact field-to-field, with which edge to exit/enter from ----------
  const relations = [
    { ft: 'dim_date', ff: 'date_key', fs: 'right', tt: 'fact_disbursement', tf: 'date_key', ts: 'left' },
    { ft: 'dim_ministry', ff: 'ministry_key', fs: 'right', tt: 'fact_disbursement', tf: 'ministry_key', ts: 'left' },
    { ft: 'dim_expense_type', ff: 'expense_type_key', fs: 'right', tt: 'fact_disbursement', tf: 'expense_type_key', ts: 'left' },
    { ft: 'dim_source', ff: 'source_id', fs: 'left', tt: 'fact_disbursement', tf: 'source_id', ts: 'right' },
    { ft: 'dim_date', ff: 'date_key', fs: 'right', tt: 'fact_workforce_summary', tf: 'date_key', ts: 'left' },
    { ft: 'dim_personnel_category', ff: 'personnel_category_key', fs: 'left', tt: 'fact_workforce_summary', tf: 'personnel_category_key', ts: 'right' },
    { ft: 'dim_source', ff: 'source_id', fs: 'left', tt: 'fact_workforce_summary', tf: 'source_id', ts: 'right' },
    { ft: 'dim_personnel_category', ff: 'personnel_category_key', fs: 'left', tt: 'fact_workforce_summary', tf: 'parent_category_key', ts: 'right' },
  ];

  function rowIndex(table, field) {
    const idx = table.rows.findIndex(r => r.name === field);
    if (idx === -1) throw new Error('Field not found: ' + field + ' in table');
    return idx;
  }

  function anchor(tableKey, field, side) {
    const t = tables[tableKey];
    const idx = rowIndex(t, field);
    const y = t.y + HEADER_H + idx * ROW_H + ROW_H / 2;
    const x = side === 'right' ? t.x + t.width : t.x;
    return { x, y };
  }

  function dirFor(side) { return side === 'right' ? 1 : -1; }

  function bezier(p1, dir1, p2, dir2) {
    const dx = Math.max(Math.abs(p2.x - p1.x) * 0.45, 70);
    const c1 = { x: p1.x + dir1 * dx, y: p1.y };
    const c2 = { x: p2.x + dir2 * dx, y: p2.y };
    return `M ${p1.x} ${p1.y} C ${c1.x} ${c1.y}, ${c2.x} ${c2.y}, ${p2.x} ${p2.y}`;
  }

  function tableHeight(t) { return HEADER_H + t.rows.length * ROW_H; }

  // ---------- compute canvas size ----------
  let maxRight = 0, maxBottom = 0;
  Object.values(tables).forEach(t => {
    maxRight = Math.max(maxRight, t.x + t.width);
    maxBottom = Math.max(maxBottom, t.y + tableHeight(t));
  });
  const W = maxRight + 40;
  const H = maxBottom + 40;

  // ---------- render tables ----------
  function renderTable(key) {
    const t = tables[key];
    const h = tableHeight(t);
    let s = `<g class="table" data-table="${key}">`;
    s += `<rect class="tbl-box" x="${t.x}" y="${t.y}" width="${t.width}" height="${h}" rx="6"/>`;
    s += `<rect class="${t.kind === 'dim' ? 'hdr-dim' : 'hdr-fact'}" x="${t.x}" y="${t.y}" width="${t.width}" height="${HEADER_H}" rx="6"/>`;
    s += `<rect x="${t.x}" y="${t.y + HEADER_H - 10}" width="${t.width}" height="10" fill="${t.kind === 'dim' ? '#3730a3' : '#991b1b'}"/>`;
    s += `<text class="hdr-text" x="${t.x + t.width / 2}" y="${t.y + 22}" text-anchor="middle">${key}</text>`;

    t.rows.forEach((r, i) => {
      const ry = t.y + HEADER_H + i * ROW_H;
      const keyClass = r.key === 'PK' ? 'pk' : r.key === 'FK' ? 'fk' : r.key === 'UK' ? 'uk' : '';
      s += `<rect class="row-rect ${keyClass}" x="${t.x}" y="${ry}" width="${t.width}" height="${ROW_H}"/>`;
      const barClass = r.key === 'PK' ? 'bar-pk' : r.key === 'FK' ? 'bar-fk' : r.key === 'UK' ? 'bar-uk' : 'bar-none';
      s += `<rect class="${barClass}" x="${t.x}" y="${ry}" width="4" height="${ROW_H}"/>`;
      s += `<text class="field-name ${keyClass === 'pk' ? 'pk' : keyClass === 'fk' ? 'fk' : ''}" x="${t.x + 14}" y="${ry + ROW_H / 2 + 4}">${r.name}</text>`;
      s += `<text class="field-type" x="${t.x + t.width - 10}" y="${ry + ROW_H / 2 + 4}" text-anchor="end">${r.type}</text>`;
      if (r.key) {
        s += `<text class="field-badge" x="${t.x + t.width - 10}" y="${ry + 9}" text-anchor="end" opacity="0">${r.key}</text>`;
      }
    });
    s += `</g>`;
    return s;
  }

  // ---------- render relation lines (row-to-row) ----------
  function renderRelation(rel) {
    const p1 = anchor(rel.ft, rel.ff, rel.fs);
    const p2 = anchor(rel.tt, rel.tf, rel.ts);
    const d = bezier(p1, dirFor(rel.fs), p2, dirFor(rel.ts));
    let s = `<g class="relation" data-from="${rel.ft}.${rel.ff}" data-to="${rel.tt}.${rel.tf}">`;
    s += `<path class="rel-line" d="${d}"/>`;
    // PK end (the "1" side)
    s += `<circle class="endpoint-pk" cx="${p1.x}" cy="${p1.y}" r="4.5"/>`;
    s += `<text class="endpoint-label" x="${p1.x + dirFor(rel.fs) * 10}" y="${p1.y - 6}" text-anchor="${rel.fs === 'right' ? 'start' : 'end'}">1</text>`;
    // FK end (the "N" side)
    s += `<circle class="endpoint-fk" cx="${p2.x}" cy="${p2.y}" r="4.5"/>`;
    s += `<text class="endpoint-label" x="${p2.x + dirFor(rel.ts) * 10}" y="${p2.y - 6}" text-anchor="${rel.ts === 'right' ? 'start' : 'end'}">N</text>`;
    s += `</g>`;
    return s;
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">`;
  // lines first (so table boxes sit visually on top of the line ends, endpoints still visible at the row edge)
  svg += `<g id="relations">` + relations.map(renderRelation).join('') + `</g>`;
  svg += `<g id="tables">` + Object.keys(tables).map(renderTable).join('') + `</g>`;
  svg += `</svg>`;

  document.getElementById('erd').innerHTML = svg;

  // hover highlight: hovering a table row highlights its relation lines
  document.querySelectorAll('.row-rect.pk, .row-rect.fk').forEach(rowEl => {
    rowEl.style.cursor = 'pointer';
  });
})();
</script>
</body>
</html>
