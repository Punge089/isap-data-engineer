<script type="text/javascript">
            /** This function combines search and order and custom field filter
             * 1. Get data from search form elements
             * 2. Get data from custom field filter form
             * 3. Combine data from both forms
             * 4. Send data to server
             * 5. Render results
             */
            jQuery(document).ready(function($) {
                let currentPage = 1;

                function getFilterFormData() {
                    const formDataArray = $('#custom-field-filter-form').serializeArray();
                    /** @type Record<string, string> Grouped Data from filter form */
                    const groupedData = {};

                    const $searchInput = $('#search-form-input-6a4fbc71651f1');

                    // Group data by name and join multiple values with a comma
                    formDataArray.forEach(function(item) {
                        const mappedItem = item.name.replace('[]', '');
                        if (groupedData[mappedItem]) {
                            groupedData[mappedItem] += ',' + item.value;
                        } else {
                            groupedData[mappedItem] = item.value;
                        }
                    });

                    // Get search data from search form
                    const searchQuery = $searchInput.val();

                    // Serialize the grouped data
                    if (searchQuery) {
                        delete groupedData['s'];
                        groupedData['s'] = searchQuery;
                    }

                    const encodedFormData = $.param(groupedData);

                    if (encodedFormData === '') {
                        return {};
                    }

                    delete groupedData['s'];

                    return groupedData;
                }

                // Search input field
                const $searchInput = $('#search-form-input-6a4fbc71651f1');
                const $targetId = $('#target-id-6a4fbc71651f4');
                const $postType = $('#pos-type-6a4fbc71651f5');
                const $resultPerPage = $('#result-per-page-6a4fbc71651f6');

                /**
                 * Trigger when reset button is clicked
                 */
                $('#reset-button').on('click', function() {
                    // Trigger form reset
                    $('#custom-field-filter-form').trigger('reset');

                    // Trigger select2 reset
                    $('.multiple-select-dropdown').val(null).trigger('change');
                });

                $('#custom-field-filter-form').submit(function(e) {
                    e.preventDefault();

                    $('#search-and-order-form-6a4fbc71651ef')[0].reset();
                    currentPage = 1;
                    performSearch();
                    return false;
                });

                /**
                 * Trigger when search form is submitted
                 */
                $('#search-and-order-form-6a4fbc71651ef').on('submit', function(e) {
                    e.preventDefault();
                    currentPage = 1; // Reset current page to 1 when a new search is performed
                    performSearch();
                    return false;
                });

                /**
                 * Trigger when dropdown is changed
                 */
                $('#sort-selection-6a4fbc71651f3').on('change', function(e) {
                    e.preventDefault();
                    currentPage = 1; // Reset current page to 1 when the order changes
                    performSearch();
                });

                /**
                 * Trigger when pagination is clicked
                 */
                $(document).on('click', '.pagination a', function(e) {
                    e.preventDefault();
                    const isNext = $(this).hasClass('next');
                    const isPrev = $(this).hasClass('prev');
                    if (isNext) {
                        // If next button is clicked, increment the current page
                        currentPage += 1;
                    } else if (isPrev) {
                        // If prev button is clicked, decrement the current page
                        currentPage -= 1;
                    } else {
                        currentPage = $(this).text();
                        currentPage = parseInt(currentPage);
                    }

                    performSearch(); // Perform the search with the updated page
                });

                /**
                 * Perform the search
                 */
                function performSearch() {

                    const searchQuery = $searchInput.val();
                    const targetIds = JSON.parse($targetId.val() || "[]");
                    const postType = $postType.val();
                    const resultPerPage = $resultPerPage.val();
                    const hiddenOrderByValue = $('#hidden-sort-selection-6a4fbc71651f2').val();
                    // the value of orderBy must be access here to get the latest value
                    const orderBy = $('#sort-selection-6a4fbc71651f3').val() || hiddenOrderByValue;

                    $('.sao-accordion').removeClass('sao-active')
                    $('.search-results').html('');
                    $('.result-control-wrapper').hide();
                    $('#loading-indicator-container-6a4fbc71651f7').show();
                    /**
                     * @type Record<string, string>
                     * Search form data
                     */
                    const searchFormData = {
                        page: currentPage,
                        result_per_page: resultPerPage,
                        term_ids: targetIds,
                        post_type: postType,
                        order_by: orderBy,
                        search_query: searchQuery,
                    };

                    const filterFormData = getFilterFormData();
                    $.ajax({
                        url: 'https://www.ocsc.go.th/wp-admin/admin-ajax.php',
                        type: 'POST',
                        data: {
                            action: 'search_filter_order', // Custom AJAX action
                            nonce: '1a3d14ac26',
                            search_form_data: searchFormData,
                            filter_form_data: filterFormData,
                        },
                        success: function(response) {
                            // Update the result container with the fetched HTML
                            $('#loading-indicator-container-6a4fbc71651f7').hide();

                            $('#sao-filter-panel').show();
                            $('.result-control-wrapper').show();
                            $('.search-results').html(response).trigger('contentUpdated');

                            // scroll to top
                            $('html, body').animate({
                                scrollTop: 0
                            }, 'fast');
                        },
                        error: function(error) {
                            $('#sao-filter-panel').show();
                            $('.result-control-wrapper').show();
                            $('#loading-indicator-container-6a4fbc71651f7').hide();
                            console.error(error);
                        },
                    });
                }

                $(document).on('contentUpdated', function() {
                    $('.single-select-dropdown').select2({});
                    $('b[role=presentation]').hide();
                    $('.select2-selection__arrow').append(
                        "<i class='fas fa-chevron-down'></i>"
                    );
                });
                                    $('.sao-accordion').show();
                
                performSearch();
            });
        </script>
