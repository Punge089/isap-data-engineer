<style>
  html, body {
    margin: 0;
    background: #0b0b0b;
  }

  #erd {
    min-height: 100vh;
    padding: 30px;
    background: #0b0b0b;
    overflow: auto;
  }

  #erd svg {
    min-width: 2200px;
    height: auto;
    background: #0b0b0b !important;
  }

  #erd svg text {
    fill: #ffffff !important;
    color: #ffffff !important;
    font-size: 18px !important;
    font-weight: 700 !important;
    opacity: 1 !important;
  }

  #erd svg .relationshipLine {
    stroke: #ffffff !important;
    stroke-width: 3px !important;
    opacity: 1 !important;
  }

  #erd svg .relationshipLabelBox {
    fill: #0b0b0b !important;
    stroke: #ffffff !important;
  }

  #erd svg .relationshipLabel {
    fill: #ffffff !important;
    font-size: 17px !important;
    font-weight: 800 !important;
  }

  #erd svg .entityBox {
    fill: #111827 !important;
    stroke: #60a5fa !important;
    stroke-width: 3px !important;
  }

  #erd svg .attributeBoxOdd,
  #erd svg .attributeBoxEven {
    fill: #1f2937 !important;
    stroke: #9ca3af !important;
    stroke-width: 1.5px !important;
  }
</style>

<div id="erd"></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: 'Arial, sans-serif',
  themeVariables: {
    darkMode: true,
    background: '#0b0b0b',

    fontSize: '18px',
    fontFamily: 'Arial, sans-serif',

    textColor: '#ffffff',
    lineColor: '#ffffff',

    primaryColor: '#111827',
    primaryTextColor: '#ffffff',
    primaryBorderColor: '#60a5fa',

    secondaryColor: '#1f2937',
    secondaryTextColor: '#ffffff',
    secondaryBorderColor: '#9ca3af',

    tertiaryColor: '#374151',
    tertiaryTextColor: '#ffffff',
    tertiaryBorderColor: '#9ca3af',

    edgeLabelBackground: '#0b0b0b'
  }
});

const src = `erDiagram
    dim_date ||--o{ fact_disbursement : date_key
    dim_ministry ||--o{ fact_disbursement : ministry_key
    dim_expense_type ||--o{ fact_disbursement : expense_type_key
    dim_source ||--o{ fact_disbursement : source_id
    dim_date ||--o{ fact_workforce_summary : date_key
    dim_personnel_category ||--o{ fact_workforce_summary : personnel_category_key
    dim_source ||--o{ fact_workforce_summary : source_id
    dim_personnel_category ||--o{ fact_workforce_summary : parent_category_key

    dim_date {
        int date_key PK
        varchar date_natural_key UK
        date report_date
        int fiscal_year_be
        int fiscal_year_ce
        int month
        int quarter
        boolean is_month_end
    }

    dim_ministry {
        int ministry_key PK
        varchar ministry_code UK
        varchar ministry_name_th
        varchar source_name_raw
    }

    dim_expense_type {
        int expense_type_key PK
        varchar expense_type_name UK
        boolean is_leaf
    }

    dim_personnel_category {
        int personnel_category_key PK
        varchar category_name UK
    }

    dim_source {
        int source_id PK
        varchar agency
        varchar source_url
        varchar file_name
        varchar file_hash UK
        timestamp ingested_at
    }

    fact_disbursement {
        int date_key FK
        int ministry_key FK
        int expense_type_key FK
        int source_id FK
        double budget_after_transfer
        double allocated
        double spending_plan
        double po_reserved
        double disbursed
        double remaining
        double disbursed_pct
    }

    fact_workforce_summary {
        int date_key FK
        int personnel_category_key FK
        int source_id FK
        bigint headcount
        double share_pct
        tinyint hierarchy_level
        int parent_category_key FK
        boolean is_leaf
    }`;

const { svg } = await mermaid.render('erd-svg', src);
document.getElementById('erd').innerHTML = svg;

const svgEl = document.querySelector('#erd svg');

svgEl.style.minWidth = '2200px';
svgEl.style.maxWidth = 'none';

/* บังคับให้ text เห็นชัดทั้งหมด */
svgEl.querySelectorAll('text').forEach(t => {
  t.setAttribute('fill', '#ffffff');
  t.setAttribute('font-size', '18px');
  t.setAttribute('font-weight', '700');
  t.style.fill = '#ffffff';
  t.style.opacity = '1';
});

/* บังคับกล่อง table ให้เข้ม */
svgEl.querySelectorAll('.entityBox').forEach(box => {
  box.setAttribute('fill', '#111827');
  box.setAttribute('stroke', '#60a5fa');
  box.setAttribute('stroke-width', '3');
});

/* บังคับแถว field ให้เข้ม */
svgEl.querySelectorAll('.attributeBoxOdd, .attributeBoxEven').forEach(box => {
  box.setAttribute('fill', '#1f2937');
  box.setAttribute('stroke', '#9ca3af');
  box.setAttribute('stroke-width', '1.5');
});

/* บังคับเส้น relationship ให้เห็นชัด */
svgEl.querySelectorAll('.relationshipLine').forEach(line => {
  line.setAttribute('stroke', '#ffffff');
  line.setAttribute('stroke-width', '3');
  line.style.opacity = '1';
});
</script>
